<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSERC USRA Project</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  :root {
    --paper:  #F3EBDB;
    --ink:    #211E1A;
    --accent: #A2472F;
  }

  body {
    background: radial-gradient(135% 95% at 50% -8%, #FBF6EE 0%, #F3EBDB 55%, #EBE0CD 100%);
    background-attachment: fixed;
    font-family: 'Space Grotesk', system-ui, sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* single centered column */
  .col {
    width: 100%; max-width: 480px; min-height: 100vh;
    display: flex; flex-direction: column; padding: 0 26px;
  }

  /* ---------- animations ---------- */
  @keyframes rise  { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fade  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes drop  { 0% { opacity: 0; transform: translateY(-16px) scale(1.5); } 60% { transform: translateY(2px) scale(1.05); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }

  /* ---------- persistent password rail ---------- */
  .rail { padding: 26px 0 22px; animation: fade 0.7s ease both; }
  .rail .meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .rail .meta span { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }
  .rail .meta .study { color: #8A8578; }
  .rail .meta .count { color: var(--accent); }
  .rail .slots { display: flex; gap: 6px; justify-content: space-between; }
  .slot {
    flex: 1; aspect-ratio: 1; max-width: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 16px;
    background: rgba(33, 30, 26, 0.03); border: 1px solid rgba(33, 30, 26, 0.12); color: transparent;
    transition: all 0.3s;
  }
  .slot.current { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); animation: pulse 2s ease-in-out infinite; }
  .slot.filled  { background: var(--accent); border-color: var(--accent); color: #F5EEE1; animation: drop 0.6s both; }

  /* every act fills the space between rail and footer, vertically centered */
  .act { flex: 1; display: flex; flex-direction: column; justify-content: center; }

  /* ---------- act: read ---------- */
  .read { padding: 20px 0 30px; animation: rise 0.7s ease both; }
  .read .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 22px; }
  .read .quotewrap { position: relative; }
  .read .qmark { position: absolute; top: -30px; left: -6px; font-family: 'Newsreader', serif; font-size: 82px; line-height: 1; color: rgba(162, 71, 47, 0.16); }
  .read .quote { position: relative; font-family: 'Newsreader', serif; font-weight: 300; font-style: italic; font-size: 23px; line-height: 1.62; color: #2B2823; letter-spacing: -0.005em; text-wrap: pretty; }

  .cta-wrap { padding-bottom: 34px; animation: fade 1s 0.3s ease both; }
  .cta {
    width: 100%; padding: 17px; background: var(--accent); color: #F7EFE4; border: none; border-radius: 100px;
    font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 15px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px; transition: transform 0.12s, background 0.2s;
  }
  .cta:hover  { background: #8E3C27; }
  .cta:active { transform: scale(0.98); }
  .cta .arrow { font-family: 'Newsreader', serif; font-size: 18px; }
  .cta-note { text-align: center; font-size: 12px; color: #9A9587; margin-top: 14px; font-weight: 300; }

  /* ---------- act: guess ---------- */
  .guess { padding: 20px 0 34px; animation: rise 0.55s ease both; }
  .guess h2 { font-family: 'Newsreader', serif; font-weight: 400; font-size: 30px; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 30px; }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    width: 100%; padding: 20px 22px; background: #FCFAF4; border: 1px solid rgba(33, 30, 26, 0.12); border-radius: 16px;
    cursor: pointer; text-align: left; display: flex; align-items: center; gap: 16px;
    transition: border-color 0.18s, background 0.18s, transform 0.1s;
  }
  .option:hover  { border-color: var(--accent); background: #FBF2EA; }
  .option:active { transform: scale(0.99); }
  .option .mark  { font-family: 'Newsreader', serif; font-style: italic; font-size: 22px; color: var(--accent); min-width: 26px; }
  .option .label { flex: 1; font-weight: 500; font-size: 17px; }
  .option .note  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #A8A499; }

  /* ---------- act: reveal ---------- */
  .reveal { padding: 14px 0 34px; animation: fade 0.6s ease both; }
  .badge { display: inline-flex; align-items: center; gap: 8px; padding: 7px 16px; background: #EFEADF; border: 1px solid rgba(33, 30, 26, 0.1); border-radius: 100px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #6E6A61; }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: #5F7A4F; }
  .reveal .saw { font-family: 'Newsreader', serif; font-style: italic; font-size: 19px; color: #2B2823; margin-top: 18px; }
  .reveal .letter-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }
  .reveal .letter-big { display: flex; align-items: center; justify-content: center; height: 96px; font-family: 'Newsreader', serif; font-weight: 400; font-size: 104px; line-height: 1; color: var(--ink); animation: drop 0.7s 0.15s both; }
  .reveal .letter-note { font-size: 13px; color: #8A8578; font-weight: 300; margin-top: 22px; line-height: 1.6; }
  /* "next stop" signpost — the destination is the hero, so long names read as intentional */
  .next { background: #FBF2EA; border: 1px solid rgba(162, 71, 47, 0.22); border-radius: 18px; padding: 22px 24px 24px; }
  .next .head { display: flex; align-items: center; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px dashed rgba(162, 71, 47, 0.32); margin-bottom: 18px; }
  .next .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
  .next .step { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #BE9077; }
  .next .kicker { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #BE9077; margin-bottom: 10px; }
  .next .place { display: flex; align-items: baseline; gap: 12px; }
  .next .place .arrow { font-family: 'Newsreader', serif; font-size: 26px; line-height: 1; color: var(--accent); }
  .next .place .name { font-family: 'Newsreader', serif; font-style: italic; font-size: 28px; line-height: 1.18; color: #2B2823; text-wrap: balance; }
  .reread { align-self: center; margin-top: 26px; background: none; border: none; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #9A9587; cursor: pointer; padding: 8px; }

  .footer { text-align: center; font-size: 11px; color: #A8A398; font-weight: 300; padding: 16px 0 26px; }
  .footer .learn-more { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; display: inline-block; margin-top: 8px; }

  /* ---------- about overlay ---------- */
  .about-overlay {
    position: fixed; inset: 0; z-index: 80;
    background: rgba(28, 26, 23, 0.55); backdrop-filter: blur(3px);
    display: flex; justify-content: center; align-items: flex-start;
    overflow-y: auto; padding: 40px 20px; animation: fade 0.3s ease both;
  }
  .about-card {
    position: relative; width: 100%; max-width: 560px;
    background: #FBF6EE; border-radius: 20px;
    box-shadow: 0 40px 90px -30px rgba(28, 26, 23, 0.7);
    padding: 52px 42px 46px; animation: rise 0.4s ease both;
  }
  .about-close {
    position: absolute; top: 18px; right: 18px; width: 34px; height: 34px;
    border-radius: 50%; border: 1px solid rgba(33, 30, 26, 0.15);
    background: #F3EBDB; color: #6E6A61; font-size: 18px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .about-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .about-title { font-family: 'Newsreader', serif; font-weight: 400; font-size: 32px; line-height: 1.1; letter-spacing: -0.01em; color: var(--ink); margin-bottom: 28px; }
  .about-body { display: flex; flex-direction: column; gap: 20px; }
  .about-body p { font-family: 'Newsreader', serif; font-weight: 300; font-size: 18px; line-height: 1.72; color: #2B2823; text-wrap: pretty; }
  .about-rule { height: 1px; background: rgba(33, 30, 26, 0.12); margin: 32px 0 20px; }
  .about-credit { font-size: 12.5px; color: #8A8578; font-weight: 300; line-height: 1.6; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>
</head>

<body>
<div class="col" id="app"><!-- rendered by JS --></div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const TOTAL = 9;
const FINAL = "the Nickle Galleries, Nicholls Family Art Museum";

const VOICE = {
  c: { label: "A child",   mark: "i",   note: "under 12"  },
  s: { label: "A student", mark: "ii",  note: "teens–20s" },
  e: { label: "An elder",  mark: "iii", note: "60+"       }
};

// Only revealed mementos carry a letter/quote. Fill the rest in as you build the hunt.
const MEMENTOS = {
  1: {
    letter: "M",
    quote: "Cyber bullying is a big problem in my school at the moment. There's been a boy who's just had it all thrown at him. And he just is alone all the time. And you feel so bad for him — but a lot of people would feel embarrassed to do stuff with him, because he's the one getting bullied. It's like being bad and good at the same time. It's really confusing.",
    location: "the Kinesiology tree"
  },
  2: { letter: "", quote: "", location: "the UCalgary bookstore" },
  3: { letter: "", quote: "", location: "" },
  4: { letter: "", quote: "", location: "" },
  5: { letter: "", quote: "", location: "" },
  6: { letter: "", quote: "", location: "" },
  7: { letter: "", quote: "", location: "" },
  8: { letter: "", quote: "", location: "" },
  9: { letter: "", quote: "", location: "" }
};

/* ============================================================
   STATE
   ============================================================ */
const params = new URLSearchParams(location.search);
let num = parseInt(params.get("num"), 10);
if (!num || num < 1 || num > TOTAL) num = 1;

let step  = "read";   // 'read' | 'guess' | 'reveal'
let guess = null;     // 'c' | 's' | 'e'

const data     = MEMENTOS[num];
const nextNum  = num < TOTAL ? num + 1 : null;
const nextLoc  = nextNum ? (MEMENTOS[nextNum].location || "the next stop") : FINAL;
const ordinals = ["first","second","third","fourth","fifth","sixth","seventh","eighth","ninth"];
const pad = n => String(n).padStart(2, "0");

const app = document.getElementById("app");

/* ============================================================
   RENDER
   ============================================================ */
function render() {
  const revealed = step === "reveal";

  // password rail — one slot per memento; the current one fills on reveal
  const slots = Array.from({ length: TOTAL }, (_, i) => {
    const n = i + 1;
    if (n === num && revealed) return `<div class="slot filled">${data.letter}</div>`;
    if (n === num)             return `<div class="slot current">·</div>`;
    return `<div class="slot">·</div>`;
  }).join("");

  const rail = `
    <div class="rail">
      <div class="meta">
        <span class="study">NSERC USRA Research Project</span>
        <span class="count">Memento ${pad(num)} / ${pad(TOTAL)}</span>
      </div>
      <div class="slots">${slots}</div>
    </div>`;

  let act = "";

  if (step === "read") {
    act = `
      <div class="act read">
        <div class="eyebrow">Someone left this here</div>
        <div class="quotewrap">
          <span class="qmark">&ldquo;</span>
          <p class="quote">${data.quote}</p>
        </div>
      </div>
      <div class="cta-wrap">
        <button class="cta" onclick="goStep('guess')">Consider who said this <span class="arrow">&rarr;</span></button>
        <p class="cta-note">Take your time.</p>
      </div>`;
  }

  if (step === "guess") {
    const options = Object.entries(VOICE).map(([key, v]) => `
      <button class="option" onclick="choose('${key}')">
        <span class="mark">${v.mark}</span>
        <span class="label">${v.label}</span>
        <span class="note">${v.note}</span>
      </button>`).join("");
    act = `
      <div class="act guess">
        <h2>Who do you think<br>said this?</h2>
        <div class="options">${options}</div>
      </div>`;
  }

  if (step === "reveal") {
    const cap    = s => s.charAt(0).toUpperCase() + s.slice(1);
    const label  = nextNum ? "The hunt continues" : "The final gathering";
    const step2  = nextNum ? "Next Location" : "Final Location";
    const kicker = nextNum ? "Make your way to" : "Bring your full password to";
    const place  = cap(nextNum ? nextLoc : FINAL);
    act = `
      <div class="act reveal">
        <div style="text-align:center;">
          <div class="badge"><span class="dot"></span> Guess sealed</div>
          <p class="saw">You saw ${VOICE[guess].label.toLowerCase()} in these words.</p>
        </div>
        <div style="text-align:center; margin:36px 0;">
          <div class="letter-label">Your ${ordinals[num - 1]} letter</div>
          <div class="letter-big">${data.letter}</div>
          <p class="letter-note">Write it down, you'll need the password at the end.</p>
        </div>
        <div class="next">
          <div class="head">
            <span class="label">${label}</span>
            <span class="step">${step2}</span>
          </div>
          <div class="kicker">${kicker}</div>
          <div class="place">
            <span class="arrow">&rarr;</span>
            <span class="name">${place}</span>
          </div>
        </div>
        <button class="reread" onclick="goStep('read')">Re-read the quote</button>
      </div>`;
  }

  app.innerHTML = rail + act +
    `<div class="footer">Ahsan Tariq &amp; Dr. Helen Ai He · C3 Lab, University of Calgary<br>
      <a class="learn-more" onclick="openAbout()">Learn more about this project</a></div>`;
}

/* ============================================================
   INTERACTIONS
   ============================================================ */
// the "about" essay, shown in an overlay from the footer link
const ABOUT = [
  "When I was 17, I was at one of the lowest points of my life. I had always been good at school, and I wasn't anymore. I only ever had one or two friends, and at that time I had none. The dynamics within my family had never been healthy, but then they felt unbearable. I almost quit. And then I got help. From people who were trying their best, every day, like I was. People who undoubtedly had their own problems, but chose to focus on mine for hours at a time. And I got better than I was, thanks to them. There are still difficult days, but I'm better than I was.",
  "This project is, in a way, a result of that period of my life. Everyone has struggles. Often, we feel alone in them. We feel like there's something wrong with us specifically; that everyone else has it figured out. This project is meant to show that that's not the case. It's meant to show that we're not alone in our experience of them. The struggles you have might be similar to the struggles of a 65 year old, or to the struggles of a 12 year old.",
  "Through reflection on perspectives from across the human lifespan on aspects of the lived human experience, this project seeks to foster common humanity. Common humanity is the recognition that all people fail, make mistakes, and feel inadequate in some way and frames suffering in light of the shared human experience."
];

function openAbout() {
  const paras = ABOUT.map(p => `<p>${p}</p>`).join("");
  const overlay = document.createElement("div");
  overlay.className = "about-overlay";
  overlay.innerHTML = `
    <div class="about-card">
      <button class="about-close" aria-label="Close" onclick="closeAbout()">&times;</button>
      <div class="about-eyebrow">A note from the creator</div>
      <h2 class="about-title">Why this project exists</h2>
      <div class="about-body">${paras}</div>
      <div class="about-rule"></div>
      <p class="about-credit">Ahsan Tariq &amp; Dr. Helen Ai He · C3 Lab, University of Calgary</p>
    </div>`;
  // click the dark backdrop (but not the card) to close
  overlay.addEventListener("click", e => { if (e.target === overlay) closeAbout(); });
  document.body.appendChild(overlay);
}
function closeAbout() {
  const o = document.querySelector(".about-overlay");
  if (o) o.remove();
}

// move between acts (re-reading clears the guess)
function goStep(s) { step = s; if (s === "read") guess = null; render(); }

// pick a voice → seal it and advance to the reveal
function choose(key) { guess = key; step = "reveal"; render(); }

/* ---------- boot ---------- */
render();
</script>
</body>
</html>
